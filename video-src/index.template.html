<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg: #090d14;
        --bg-deep: #0f1725;
        --panel: rgba(8, 12, 18, 0.72);
        --panel-strong: rgba(10, 14, 22, 0.9);
        --line: rgba(255, 255, 255, 0.14);
        --line-soft: rgba(255, 255, 255, 0.08);
        --text: #f3eadf;
        --muted: rgba(243, 234, 223, 0.68);
        --accent: #ff6d3d;
        --accent-warm: #f7ba75;
        --accent-soft: rgba(255, 109, 61, 0.26);
        --shadow: rgba(0, 0, 0, 0.42);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 10%, rgba(255, 109, 61, 0.16), rgba(255, 109, 61, 0) 24%),
          radial-gradient(circle at 84% 14%, rgba(247, 186, 117, 0.12), rgba(247, 186, 117, 0) 18%),
          linear-gradient(160deg, #0a1018 0%, #121b29 55%, #0a1017 100%);
        color: var(--text);
      }

      body {
        font-family: sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 14% 20%, rgba(255, 109, 61, 0.12), rgba(255, 109, 61, 0) 28%),
          radial-gradient(circle at 88% 18%, rgba(247, 186, 117, 0.09), rgba(247, 186, 117, 0) 22%);
      }

      .scene {
        position: absolute;
        inset: 0;
        background-color: #0b1119;
        overflow: hidden;
      }

      .scene__frame {
        position: absolute;
        inset: 0;
      }

      .scene__backdrop {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .scene__glow {
        position: absolute;
        border-radius: 999px;
        filter: blur(54px);
        mix-blend-mode: screen;
      }

      .scene__glow--left {
        left: -6%;
        top: 8%;
        width: 26%;
        height: 38%;
        background: rgba(255, 109, 61, 0.24);
      }

      .scene__glow--right {
        right: -5%;
        top: 10%;
        width: 30%;
        height: 42%;
        background: rgba(247, 186, 117, 0.18);
      }

      .scene__grid {
        position: absolute;
        left: -3%;
        top: 15%;
        width: 42%;
        height: 70%;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 48px 180px 72px 118px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.015)),
          linear-gradient(145deg, rgba(255, 109, 61, 0.08), rgba(8, 12, 18, 0.04) 34%, rgba(247, 186, 117, 0.04));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 30px 60px rgba(0, 0, 0, 0.18);
        opacity: 0.32;
        transform: rotate(-6deg);
      }

      .scene__ghost {
        position: absolute;
        right: 62px;
        bottom: 52px;
        font-size: 210px;
        font-weight: 900;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.05);
        transform: rotate(-90deg);
        transform-origin: right bottom;
      }

      .scene__scanline {
        position: absolute;
        left: 30%;
        top: 4%;
        width: 44%;
        height: 92%;
        background: linear-gradient(135deg, rgba(255,255,255,0.11), rgba(255,255,255,0) 20%, rgba(255,255,255,0) 72%, rgba(247, 186, 117, 0.07));
        clip-path: polygon(22% 0, 100% 0, 78% 100%, 0 100%);
        opacity: 0.72;
        transform-origin: left center;
      }

      .scene__shell {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 52px 78px 44px;
      }

      .scene__left,
      .scene__right {
        position: relative;
      }

      .scene__left {
        position: absolute;
        left: 0;
        top: 0;
        width: 50%;
        height: 100%;
        overflow: visible;
      }

      .nameplate {
        position: absolute;
        top: 24px;
        left: 42px;
        z-index: 4;
        padding: 10px 0 14px;
      }

      .nameplate__alias {
        font-size: 92px;
        line-height: 0.94;
        letter-spacing: 0.08em;
        font-weight: 900;
        text-shadow: 0 10px 18px rgba(0, 0, 0, 0.3);
      }

      .operator-wrap {
        position: absolute;
        inset: 0;
        z-index: 2;
      }

      .operator {
        position: absolute;
        left: -4%;
        bottom: -7%;
        width: 98%;
        height: auto;
        max-height: 104%;
        object-fit: contain;
        object-position: center bottom;
        filter: saturate(1.03) contrast(1.02) drop-shadow(0 28px 44px rgba(0, 0, 0, 0.48));
      }

      .scene__right {
        position: absolute;
        right: 5%;
        top: 10%;
        width: 36%;
        height: 78%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        z-index: 3;
      }

      .radar {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        filter: drop-shadow(0 10px 26px rgba(0, 0, 0, 0.28));
      }

      .radar::before {
        content: "";
        position: absolute;
        inset: 10% 10%;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(255,255,255,0.08), rgba(255,255,255,0.02) 44%, rgba(255,255,255,0) 72%),
          radial-gradient(circle, rgba(255,109,61,0.12), rgba(255,109,61,0) 62%);
        filter: blur(10px);
        pointer-events: none;
      }

      .radar svg {
        width: 100%;
        height: 100%;
      }

      .radar-grid-ring {
        fill: none;
        stroke: rgba(255, 255, 255, 0.18);
        stroke-width: 2;
      }

      .radar-grid-axis {
        stroke: rgba(255, 255, 255, 0.18);
        stroke-width: 2;
      }

      .radar-data {
        fill: rgba(255, 109, 61, 0.42);
        stroke: rgba(247, 186, 117, 0.98);
        stroke-width: 6;
        transform-origin: 320px 320px;
        filter: drop-shadow(0 0 28px rgba(255, 109, 61, 0.32));
      }

      .radar-label {
        position: absolute;
        font-size: 44px;
        line-height: 1;
        letter-spacing: 0.05em;
        font-weight: 900;
        text-shadow: 0 6px 16px rgba(0, 0, 0, 0.34);
        z-index: 1;
      }

      .radar-label--top {
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
      }

      .radar-label--top-right {
        top: 18%;
        right: -8px;
      }

      .radar-label--bottom-right {
        right: -8px;
        bottom: 18%;
      }

      .radar-label--bottom {
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
      }

      .radar-label--bottom-left {
        left: -8px;
        bottom: 18%;
      }

      .radar-label--top-left {
        left: -8px;
        top: 18%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__TOTAL_DURATION__"
      data-width="1920"
      data-height="1080"
    >
__SCENES_MARKUP__
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      __TIMELINE_SCRIPT__

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
